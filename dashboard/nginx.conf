server {
    listen 8080;
    server_name _;

    # Dashboard
    location / {
        root /usr/share/nginx/html;
        index index.html;
    }

    # Camera server reverse proxy (MJPEG streams + JPEG snapshots)
    location /cameras/ {
        proxy_pass http://host.containers.internal:8211/cameras/;
        proxy_buffering off;
        proxy_cache off;
        proxy_set_header Connection '';
        proxy_http_version 1.1;
        chunked_transfer_encoding off;
    }
}
